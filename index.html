<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0f2151" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KMZERO" />
    <meta name="description" content="KMZERO - Sistema de gestão inteligente de obras. KM Consultoria, Assessoria e Serviços de Engenharia." />
    <title>KMZERO - Gestão de Obras</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0f2151;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overscroll-behavior: none;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      .loading-splash {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #0f2151, #1e3a8a);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        z-index: 9999;
      }
      .loading-splash .logo {
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -2px;
      }
      .loading-splash .logo span { color: #C0A040; }
      .loading-splash .sub {
        font-size: 11px;
        color: rgba(255,255,255,0.6);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-top: 8px;
      }
      .loading-splash .spinner {
        margin-top: 30px;
        width: 30px;
        height: 30px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: #C0A040;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-splash">
        <div class="logo">KM<span>ZERO</span></div>
        <div class="sub">Gestão de Obras</div>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
